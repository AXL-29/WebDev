<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flag of Laos Optimize</title>

    <style>
        
        p {
            font-size: 5rem;
            color: white;
            text-align: center;
            margin: 0;
        }

        div >div > p {
            color: black;
        }

        /* Red Rectangle */
        .flag {
            width: 900px;
            height: 600px;
            background-color: #ce1126;
            position: absolute;
        }

        /* Blue Rectangle */
        .flag > div {
            width: 100%;
            height: 300px;
            background-color: #002868;
            position: absolute;
            top: 145px;
        }

        /* White Circle */
        .flag > div > div {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background-color: white;
            position: relative;
            left: 350px;
            top: 50px;
        }

    </style>

</head>

<body>
    <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p>of Laos</p>
      </div>
    </div>
  </div>
</body>
</html>
